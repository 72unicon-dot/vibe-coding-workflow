<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브코딩으로 앱 만들기 - 단계별 데모</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- 상단 헤더 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-slate-900">🎯 바이브코딩 앱 개발 단계별 데모</h1>
        <p class="text-xs text-slate-500 mt-0.5">강의 교재용 · 아이디어부터 피드백 반영까지 11단계 인터랙티브 학습</p>
      </div>
      <div class="flex items-center gap-3">
        <button id="batchDownloadOpenBtn" class="text-sm px-3 py-1.5 rounded-lg border border-indigo-200 text-indigo-700 bg-indigo-50 hover:bg-indigo-100 transition flex items-center gap-1 font-semibold">
          💾 전체 파일 다운로드
        </button>
        <button id="apiSettingsBtn" class="text-sm px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-100 transition flex items-center gap-1">
          <span>⚙️</span> API 설정
        </button>
        <button id="resetBtn" class="text-sm px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-100 transition">
          🔄 처음부터
        </button>
        <button id="demoModeBtn" class="text-sm px-3 py-1.5 rounded-lg bg-purple-600 text-white hover:bg-purple-700 transition">
          📝 데모 모드
        </button>
        <button id="directModeBtn" class="text-sm px-3 py-1.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition">
          ✍️ 직접 입력 모드
        </button>
        <button id="toggleAutoRelayBtn" class="text-sm px-3 py-1.5 rounded-lg border border-emerald-300 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 transition flex items-center gap-1 font-semibold">
          <span id="autoRelayStatusIcon">🟢</span> 자동 릴레이: ON
        </button>
      </div>
    </div>

    <!-- 진행률 바 -->
    <div class="max-w-7xl mx-auto px-6 pb-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium text-slate-600" id="progressLabel">0 / 11 단계</span>
        <span class="text-xs text-slate-500" id="progressPercent">0%</span>
      </div>
      <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- 본문 -->
  <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-12 gap-6">

    <!-- 좌측: 단계 네비게이션 -->
    <aside class="col-span-12 lg:col-span-3">
      <div class="bg-white rounded-2xl border border-slate-200 p-4 sticky top-32">
        <h2 class="text-sm font-bold text-slate-900 mb-3 flex items-center gap-2">
          <span>📍 학습 단계</span>
        </h2>
        <nav id="stepNav" class="flex flex-col gap-1.5"></nav>

        <div class="mt-6 pt-4 border-t border-slate-200">
          <h3 class="text-xs font-bold text-slate-700 mb-2">💡 현재 시나리오</h3>
          <div id="currentScenarioBox" class="text-xs text-slate-600 bg-slate-50 rounded-lg p-3">
            아직 선택되지 않음
          </div>
        </div>
      </div>
    </aside>

    <!-- 중앙: 단계별 콘텐츠 -->
    <section class="col-span-12 lg:col-span-9">
      <div id="stageContent" class="bg-white rounded-2xl border border-slate-200 shadow-sm min-h-[600px]"></div>

      <!-- 하단 네비게이션 버튼 -->
      <div class="flex items-center justify-between mt-6">
        <button id="prevBtn" class="px-5 py-2.5 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-100 transition disabled:opacity-40 disabled:cursor-not-allowed">
          ← 이전 단계
        </button>
        <button id="nextBtn" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold hover:from-indigo-700 hover:to-purple-700 transition shadow-md">
          다음 단계 →
        </button>
      </div>
    </section>
  </main>

  <footer class="text-center text-xs text-slate-400 py-8">
    Made for Lecture · Vibe Coding Demo App · v1.0
  </footer>

  <!-- API 설정 모달 -->
  <div id="apiModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl relative">
      <button id="closeApiModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <h2 class="text-xl font-bold text-slate-900 mb-2 flex items-center gap-2">
        <span>⚙️</span> OpenAI API 설정
      </h2>
      <p class="text-sm text-slate-500 mb-4">
        직접 시행 기능을 사용하려면 발급받은 API 키를 입력하세요. 키는 브라우저 로컬 스토리지에 안전하게 저장됩니다.
      </p>
      <div class="mb-5">
        <label for="apiKeyInput" class="block text-sm font-semibold text-slate-700 mb-2">API Key (sk-...)</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
      </div>
      <div class="flex justify-end gap-2">
        <button id="cancelApiModalBtn" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 transition text-sm">취소</button>
        <button id="saveApiModalBtn" class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition text-sm">저장</button>
      </div>
    </div>
  </div>

  <!-- 앱 미리보기 모달 -->
  <div id="previewModal" class="fixed inset-0 bg-black/80 z-50 hidden flex flex-col items-center justify-center p-4 lg:p-10">
    <div class="bg-white rounded-t-2xl p-4 w-full max-w-5xl flex justify-between items-center shadow-lg">
      <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
        <span>📱</span> 앱 미리보기
      </h2>
      <button id="closePreviewModalBtn" class="text-slate-500 hover:text-slate-800 transition bg-slate-100 hover:bg-slate-200 rounded-full p-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="bg-slate-100 w-full max-w-5xl flex-1 rounded-b-2xl overflow-hidden shadow-2xl relative border-t border-slate-200">
      <iframe id="previewIframe" class="w-full h-full bg-white" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <!-- 일괄 다운로드 모달 -->
  <div id="batchDownloadModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
      <div class="p-6 border-b border-slate-200">
        <h3 class="text-xl font-bold text-slate-900">💾 파일 다운로드</h3>
        <p class="text-sm text-slate-500 mt-1">지금까지 생성된 파일을 선택하여 일괄 다운로드하세요.</p>
      </div>
      <div class="p-6 max-h-[60vh] overflow-y-auto" id="batchDownloadList">
        <!-- 체크박스 목록이 JS로 렌더링됨 -->
      </div>
      <div class="p-6 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
        <button id="closeBatchDownloadModalBtn" class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-100 transition font-semibold text-sm">
          취소
        </button>
        <button id="executeBatchDownloadBtn" class="px-4 py-2 rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 transition font-semibold text-sm">
          선택 항목 다운로드
        </button>
      </div>
    </div>
  </div>

  <script src="data/scenarios.js"></script>
  <script src="app.js"></script>
</body>
</html>
